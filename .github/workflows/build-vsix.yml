name: Build VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Compute VSIX filename
        id: package_meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix=geojson-visual-editor-$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: npm run package:vsix -- --out "${{ steps.package_meta.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_meta.outputs.vsix }}
          path: ${{ steps.package_meta.outputs.vsix }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.package_meta.outputs.vsix }}
